<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GeoTransport Live Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600&display=swap');

    :root {
      --neutral-grey: #ededed;
      --neutral-text: #2f2f2f;
      --accent: #555555;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Public Sans', 'Helvetica Neue', Arial, sans-serif;
      color: var(--neutral-text);
      background: #ffffff;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: var(--neutral-grey);
      border-bottom: 4px solid var(--accent);
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar__mark {
      width: 12px;
      height: 32px;
      background: var(--accent);
      border-radius: 2px;
      flex-shrink: 0;
    }

    .topbar__title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin: 0;
    }

    #map {
      width: 100%;
      flex: 1;
    }
  </style>
</head>
<body>
  <header class="topbar" aria-label="GeoTransport navigatiebalk">
    <span class="topbar__mark" aria-hidden="true"></span>
    <p class="topbar__title">GeoTransport</p>
  </header>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="/map.js"></script>
</body>
</html>
