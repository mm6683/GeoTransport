<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GeoTransport Live Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600&display=swap');

    :root {
      --surface: #f5f5f7;
      --surface-strong: #dedfe3;
      --text-strong: #242424;
      --accent: #4a4a4a;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Public Sans', 'Helvetica Neue', Arial, sans-serif;
      color: var(--text-strong);
      background: #ffffff;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: var(--surface);
    }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--surface-strong);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
    }

    .topbar__mark {
      width: 12px;
      height: 32px;
      background: var(--accent);
      border-radius: 2px;
      flex-shrink: 0;
    }

    .topbar__title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin: 0;
      color: var(--text-strong);
    }

    main {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    #map {
      width: 100%;
      flex: 1;
      min-height: 0;
    }
  </style>
</head>
<body>
  <header class="topbar" aria-label="GeoTransport navigatiebalk">
    <span class="topbar__mark" aria-hidden="true"></span>
    <p class="topbar__title">GeoTransport</p>
  </header>
  <main>
    <div id="map"></div>
  </main>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="/map.js"></script>
</body>
</html>
