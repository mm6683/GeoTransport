<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geotransport · Live Tracker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080c10;--surface:#0e1419;--surface2:#141b23;--border:#1e2d3d;
      --accent:#00d4ff;--accent2:#ff6b35;--accent3:#a8ff3e;
      --text:#c8dae8;--text-dim:#6b8899;--danger:#ff3b5c;
      --panel:320px;
      --font-ui:'Oxanium',sans-serif;--font-mono:'JetBrains Mono',monospace;
    }
    html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--font-ui);overflow:hidden}
    #app{position:relative;width:100vw;height:100vh;display:flex}
    #map{flex:1;height:100%;background:var(--bg);z-index:1}

    /* Sidebar */
    #sidebar{position:absolute;top:0;left:0;bottom:0;width:290px;background:linear-gradient(180deg,rgba(8,12,16,.97),rgba(14,20,25,.95));border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;backdrop-filter:blur(12px)}
    #header{padding:16px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
    .logo-row{display:flex;align-items:center;gap:10px}
    .logo-hex{width:34px;height:34px;background:var(--accent);flex-shrink:0;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center}
    .logo-hex svg{width:20px;height:20px;fill:var(--bg)}
    .logo-name{font-size:19px;font-weight:700;letter-spacing:.1em;color:#fff;text-transform:uppercase}
    .logo-sub{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-family:var(--font-mono)}

    #status-bar{padding:10px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
    .status-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
    .live-dot{display:inline-flex;align-items:center;gap:6px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-family:var(--font-mono)}
    .pulse{width:7px;height:7px;border-radius:50%;background:var(--accent3);animation:pa 2s infinite}
    .pulse.err{background:var(--danger);animation:none}
    .pulse.spin{background:var(--accent);animation:sp 1s linear infinite}
    @keyframes pa{0%{box-shadow:0 0 0 0 rgba(168,255,62,.6)}70%{box-shadow:0 0 0 8px rgba(168,255,62,0)}100%{box-shadow:0 0 0 0 rgba(168,255,62,0)}}
    @keyframes sp{to{transform:rotate(360deg)}}
    .status-ts{font-size:11px;font-family:var(--font-mono);color:var(--text-dim)}
    #bar-wrap{height:2px;background:var(--border);border-radius:1px;margin-top:6px;overflow:hidden}
    #bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:1px;transition:width 1s linear}

    #stats{padding:10px 20px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:repeat(3,1fr);gap:7px;flex-shrink:0}
    .sc{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 10px}
    .sn{font-size:19px;font-weight:700;font-family:var(--font-mono);color:var(--accent);line-height:1}
    .sn.or{color:var(--accent2)}.sn.gr{color:var(--accent3)}.sn.re{color:var(--danger)}.sn.ye{color:#ffcc00}.sn.di{color:var(--text-dim)}
    .sl{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);margin-top:3px;font-family:var(--font-mono)}

    #tabs{display:flex;flex-shrink:0;border-bottom:1px solid var(--border)}
    .tab{flex:1;padding:9px 0;text-align:center;font-size:10px;font-family:var(--font-mono);letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;user-select:none}
    .tab:hover{color:var(--text)}
    .tab.av{color:var(--accent);border-bottom-color:var(--accent)}
    .tab.ac{color:var(--danger);border-bottom-color:var(--danger)}
    .tb{display:inline-block;margin-left:4px;padding:1px 5px;border-radius:10px;font-size:9px;background:var(--surface2)}

    .pane{display:none;flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;position:relative}
    .pane.on{display:block}
    .pane::-webkit-scrollbar{width:4px}
    .pane::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .vs{width:1px}.vw{position:absolute;top:0;left:0;right:0}

    .vr{display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(30,45,61,.45);cursor:pointer;transition:background .12s;padding:0 18px}
    .vr:hover{background:rgba(0,212,255,.04)}
    .vr.sel{background:rgba(0,212,255,.08);border-left:2px solid var(--accent);padding-left:16px}
    .vr.cr{cursor:default}.vr.cr:hover{background:none}
    .badge{width:38px;height:22px;border-radius:4px;font-size:11px;font-weight:700;font-family:var(--font-mono);flex-shrink:0;display:flex;align-items:center;justify-content:center}
    .ri{flex:1;min-width:0}
    .rr{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .rm{font-size:10px;color:var(--text-dim);font-family:var(--font-mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .rd{font-size:11px;font-family:var(--font-mono);font-weight:500;flex-shrink:0}
    .cx{font-size:9px;font-family:var(--font-mono);font-weight:600;letter-spacing:.1em;color:var(--danger);background:rgba(255,59,92,.1);border:1px solid rgba(255,59,92,.3);border-radius:3px;padding:2px 5px;flex-shrink:0}

    /* Bearing arrow markers */
    .arrow-marker{position:relative;display:flex;align-items:center;justify-content:center}

    /* Popup */
    .leaflet-popup-content-wrapper{background:var(--surface)!important;border:1px solid var(--border)!important;border-radius:10px!important;box-shadow:0 4px 24px rgba(0,0,0,.5)!important;color:var(--text)!important;font-family:var(--font-ui)!important;padding:0!important}
    .leaflet-popup-tip-container{display:none!important}
    .leaflet-popup-content{margin:0!important}
    .mp{padding:14px 16px;min-width:200px}
    .mp-badge{display:inline-flex;align-items:center;justify-content:center;padding:3px 10px;border-radius:20px;font-size:13px;font-weight:700;margin-bottom:8px;letter-spacing:.05em}
    .mp-dest{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
    .mp-sub{font-size:11px;color:var(--text-dim);font-family:var(--font-mono);margin-bottom:10px}
    .mp-delay{font-size:12px;font-family:var(--font-mono);margin-bottom:12px}
    .mp-btn{width:100%;padding:8px;border:1px solid var(--accent);background:rgba(0,212,255,.08);color:var(--accent);border-radius:6px;font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .15s}
    .mp-btn:hover{background:rgba(0,212,255,.18)}
    .mp-link{display:block;font-size:10px;font-family:var(--font-mono);color:var(--text-dim);text-decoration:none;margin-bottom:8px;}
    .mp-link:hover{color:var(--accent)}

    .leaflet-control-attribution{background:rgba(8,12,16,.8)!important;color:#4a6070!important;font-size:10px!important}
    .leaflet-control-attribution a{color:var(--accent)!important}
    .leaflet-control-zoom a{background:var(--surface)!important;border-color:var(--border)!important;color:var(--text)!important}
    .leaflet-control-zoom a:hover{background:var(--surface2)!important}

    /* Info panel */
    #info-panel{position:absolute;top:0;right:0;bottom:0;width:var(--panel);background:linear-gradient(180deg,rgba(8,12,16,.98),rgba(14,20,25,.96));border-left:1px solid var(--border);z-index:200;display:flex;flex-direction:column;backdrop-filter:blur(16px);transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
    #info-panel.open{transform:translateX(0)}
    #ip-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
    #ip-close{background:none;border:1px solid var(--border);color:var(--text-dim);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;margin-left:auto;flex-shrink:0;transition:all .15s}
    #ip-close:hover{border-color:var(--text);color:var(--text)}
    #ip-badge{padding:4px 12px;border-radius:20px;font-size:14px;font-weight:700;letter-spacing:.05em;flex-shrink:0}
    #ip-title{font-size:15px;font-weight:600;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    #ip-body{flex:1;overflow-y:auto;padding:18px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    #ip-body::-webkit-scrollbar{width:4px}
    #ip-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

    .ip-section{margin-bottom:20px}
    .ip-section-title{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);font-family:var(--font-mono);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
    .ip-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .ip-field{}
    .ip-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);font-family:var(--font-mono);margin-bottom:3px}
    .ip-value{font-size:13px;font-weight:600;font-family:var(--font-mono);color:var(--text);word-break:break-all}
    .ip-value.accent{color:var(--accent)}.ip-value.danger{color:var(--danger)}.ip-value.green{color:var(--accent3)}.ip-value.orange{color:var(--accent2)}.ip-value.di{color:var(--text-dim)}
    .ip-full{grid-column:1/-1}
    .ip-link{color:var(--accent);text-decoration:none;font-size:11px;font-family:var(--font-mono)}
    .ip-link:hover{text-decoration:underline}
    .ip-swatch{display:inline-block;width:12px;height:12px;border-radius:2px;vertical-align:middle;margin-right:5px}
    .ip-share-btn{width:100%;padding:9px;border:1px solid var(--border);background:var(--surface2);color:var(--accent);border-radius:6px;font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .15s,border-color .15s;display:flex;align-items:center;justify-content:center;gap:6px}
    .ip-share-btn:hover{background:var(--border);border-color:var(--accent)}

    /* Search */
    #search-wrap{padding:8px 14px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative}
    #search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 30px 7px 30px;color:var(--text);font-family:var(--font-mono);font-size:11px;outline:none;transition:border-color .15s}
    #search-input::placeholder{color:var(--text-dim)}
    #search-input:focus{border-color:var(--accent)}
    .search-icon{position:absolute;left:22px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none;font-size:13px}
    #search-clear{position:absolute;right:22px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;line-height:1;padding:2px;display:none}
    #search-clear:hover{color:var(--text)}
    #search-drop{position:absolute;top:calc(100% - 2px);left:14px;right:14px;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;z-index:500;display:none;max-height:280px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.4)}
    #search-drop.on{display:block}
    .sd-group{padding:6px 12px 2px;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-dim);font-family:var(--font-mono);border-top:1px solid var(--border)}
    .sd-group:first-child{border-top:none}
    .sd-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;transition:background .1s}
    .sd-item:hover,.sd-item.hi{background:rgba(0,212,255,.07)}
    .sd-badge{flex-shrink:0;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;font-family:var(--font-mono)}
    .sd-main{flex:1;min-width:0;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sd-sub{font-size:10px;color:var(--text-dim);font-family:var(--font-mono);white-space:nowrap;flex-shrink:0}
    .sd-delay{font-size:10px;font-family:var(--font-mono);font-weight:600;white-space:nowrap;flex-shrink:0}

    /* Filter active indicator — shown in search input, not in tabs */
    #tabs{position:relative}

    #toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 16px;font-size:12px;font-family:var(--font-mono);z-index:9999;opacity:0;transform:translateY(8px);transition:opacity .2s,transform .2s;pointer-events:none;max-width:320px}
    #toast.on{opacity:1;transform:translateY(0)}
    #toast.er{border-color:var(--danger);color:var(--danger)}
    #brand{position:absolute;bottom:28px;left:306px;z-index:50;font-family:var(--font-ui);font-size:11px;font-weight:300;letter-spacing:.3em;text-transform:uppercase;color:rgba(200,218,232,.18);pointer-events:none}

    /* ── Stops section in More Info panel ────────────────────────────────────── */
    .stop-list{margin-top:4px}
    .stop-row{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid rgba(30,45,61,.35)}
    .stop-row:last-child{border-bottom:none}
    .stop-track{display:flex;flex-direction:column;align-items:center;gap:0;flex-shrink:0;padding-top:3px}
    .stop-dot{width:9px;height:9px;border-radius:50%;background:var(--border);border:2px solid var(--text-dim);flex-shrink:0}
    .stop-dot.passed{background:rgba(107,136,153,.3);border-color:rgba(107,136,153,.3)}
    .stop-dot.next{background:var(--accent);border-color:var(--accent);box-shadow:0 0 5px rgba(0,212,255,.6)}
    .stop-dot.term{background:var(--accent2);border-color:var(--accent2)}
    .stop-info{flex:1;min-width:0}
    .stop-name{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .stop-name.passed{color:var(--text-dim);font-weight:400}
    .stop-times{display:flex;gap:6px;margin-top:2px;font-size:10px;font-family:var(--font-mono);color:var(--text-dim)}
    .stop-times .adj{color:var(--accent3);font-weight:600}
    .stop-times .late{color:var(--accent2)}
    .stop-times .vlate{color:var(--danger)}

    /* ── Mobile FAB ──────────────────────────────────────────────────────────── */
    #mob-fab{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:350;
      background:var(--surface);border:1px solid var(--border);border-radius:24px;
      padding:10px 22px;font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;
      text-transform:uppercase;color:var(--accent);cursor:pointer;
      box-shadow:0 4px 20px rgba(0,0,0,.6);transition:background .15s;align-items:center;gap:8px}
    #mob-fab:hover{background:var(--surface2)}

    /* ── Mobile responsive ───────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      #sidebar{
        position:fixed;bottom:0;left:0;right:0;top:auto;
        width:100%;height:68vh;
        border-right:none;border-top:1px solid var(--border);
        border-radius:16px 16px 0 0;
        transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
        z-index:400;
      }
      #sidebar.mob-open{transform:translateY(0)}
      #mob-handle{display:block!important}
      #info-panel{
        top:auto;right:0;left:0;bottom:0;
        width:100%;height:72vh;
        border-left:none;border-top:1px solid var(--border);
        border-radius:16px 16px 0 0;
      }
      #info-panel.open{transform:translateY(0)}
      #mob-fab{display:flex}
      #map{width:100%;height:100%}
      #brand{display:none}
      #toast{bottom:80px;right:12px;left:12px;max-width:none}
    }
    /* ── Stop markers on map ─────────────────────────────────────────────────── */
    .stop-mk{pointer-events:auto!important}
    .stop-tip{background:var(--surface)!important;border:1px solid var(--border)!important;color:var(--text)!important;font-family:var(--font-mono)!important;font-size:11px!important;padding:4px 8px!important;border-radius:4px!important;box-shadow:0 2px 8px rgba(0,0,0,.4)!important;white-space:nowrap}

    /* ── Mobile close buttons ────────────────────────────────────────────────── */
    .mob-close-btn{display:none;position:absolute;top:14px;right:14px;z-index:10;
      background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);
      width:30px;height:30px;border-radius:8px;font-size:15px;cursor:pointer;
      align-items:center;justify-content:center;line-height:1;padding:0}
    .mob-close-btn:hover{border-color:var(--text);color:var(--text)}
    @media(max-width:768px){.mob-close-btn{display:flex}}

    #mob-handle{display:none;width:40px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;flex-shrink:0}

  </style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div id="mob-handle"></div>
    <button class="mob-close-btn" onclick="closeSidebarMobile()" title="Close">✕</button>
    <div id="search-wrap">
      <span class="search-icon">⌕</span>
      <input id="search-input" type="text" placeholder="Line, route, trip, vehicle, type…" autocomplete="off" />
      <button id="search-clear" onclick="clearSearch()">✕</button>
      <div id="search-drop"></div>
    </div>
    <div id="header">
      <div class="logo-row">
        <div class="logo-hex">
          <svg viewBox="0 0 24 24"><path d="M12 2C8 2 4 2.5 4 6v10c0 1.1.9 2 2 2h1l1 2h8l1-2h1c1.1 0 2-.9 2-2V6c0-3.5-4-4-8-4zm0 2c3.8 0 5.8.5 6 1.5H6C6.2 5.5 8.2 5 12 5zM6 8h12v5H6V8zm1.5 8a1.5 1.5 0 110-3 1.5 1.5 0 010 3zm9 0a1.5 1.5 0 110-3 1.5 1.5 0 010 3z"/></svg>
        </div>
        <div>
          <div class="logo-name">Geotransport</div>
          <div class="logo-sub">De Lijn · Live</div>
        </div>
      </div>
    </div>
    <div id="status-bar">
      <div class="status-row">
        <div class="live-dot"><div class="pulse spin" id="pd"></div><span id="lt">Connecting…</span></div>
        <div class="status-ts" id="ts">–</div>
      </div>
      <div id="bar-wrap"><div id="bar" style="width:0%"></div></div>
    </div>
    <div id="stats">
      <div class="sc"><div class="sn" id="sv">–</div><div class="sl">Active</div></div>
      <div class="sc"><div class="sn gr" id="so">–</div><div class="sl">On Time</div></div>
      <div class="sc"><div class="sn or" id="sd">–</div><div class="sl">Delayed</div></div>
      <div class="sc"><div class="sn re" id="sc2">–</div><div class="sl">Canceled</div></div>
      <div class="sc"><div class="sn ye" id="se2">–</div><div class="sl">Early</div></div>
      <div class="sc"><div class="sn di" id="se">–</div><div class="sl">Total</div></div>
    </div>
    <div id="tabs">
      <div class="tab av" id="tv" onclick="switchTab('v')">Vehicles <span class="tb" id="bv">0</span></div>
      <div class="tab"    id="tc" onclick="switchTab('c')">Canceled <span class="tb" id="bc">0</span></div>
    </div>
    <div class="pane on" id="pv"><div class="vs" id="sv2"></div><div class="vw" id="wv"></div></div>
    <div class="pane"    id="pc"><div class="vs" id="sc3"></div><div class="vw" id="wc"></div></div>
  </aside>

  <div id="map"></div>
  <button id="mob-fab" onclick="toggleSidebar()">☰ Vehicles</button>
  <div id="brand">Belgium · GTFS-RT</div>

  <div id="info-panel">
    <div id="mob-handle"></div>
    <button class="mob-close-btn" onclick="closePanel()" title="Close">✕</button>
    <div id="ip-head">
      <div id="ip-badge">–</div>
      <div id="ip-title">–</div>
      <button id="ip-close" onclick="closePanel()">✕</button>
    </div>
    <div id="ip-body"></div>
  </div>
</div>
<div id="toast"></div>

<script>
const REFRESH = 15000;
const TILE = "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png";
const ATTR = '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>';
const IH_V = 52, IH_C = 46;
const ROUTE_TYPES = {'0':'Tram','1':'Metro','2':'Rail','3':'Bus','4':'Ferry','11':'Trolleybus'};

// ── Static lookup ─────────────────────────────────────────────────────────────
let SL = null;
let STOPS = null;  // stop_id → {n, a, o}  (from stops.json)
let STOPS_tried = false;  // prevent repeated 404 fetches

async function loadStatic() {
  try {
    const r = await fetch('/static-lookup.json', { cache: 'force-cache' });
    if (!r.ok) return;
    SL = await r.json();
    arrowLayer.setVehicles(Object.values(vData));
    redraw();
    // If a panel is already open, re-populate everything now that SL is ready
    if (activeId && vData[activeId]) {
      const v = vData[activeId];
      const ti = getTrip(v.tripId);
      const lc = v.tripId?.split('_')[0];
      // Re-show shape now that we have the trip lookup
      if (ti?.shapeId && lc) showShape(ti.shapeId, lc).catch(() => {});
      // Refresh popup with correct line name/colour
      if (activePopup) showPopup(activeId);
    }
  } catch(e) { console.warn('Static lookup:', e.message); }
}

// ST: lineCode → { tripKey → [{s,a}] }  — loaded per line on demand
const ST = {};
const ST_loading = new Set();  // prevent duplicate in-flight fetches

async function loadStopTimes(tripId) {
  if (!tripId) return;
  const lineCode = tripId.split('_')[0];
  if (ST[lineCode] !== undefined) return;
  if (ST_loading.has(lineCode)) {
    await new Promise(resolve => {
      const id = setInterval(() => { if (!ST_loading.has(lineCode)) { clearInterval(id); resolve(); } }, 20);
    });
    return;
  }
  ST_loading.add(lineCode);
  try {
    const r = await fetch(`/stop-times/${lineCode}.json`, { cache: 'force-cache' });
    if (r.ok) {
      ST[lineCode] = await r.json();
    } else {
      console.warn(`[GT] stop-times/${lineCode}.json → HTTP ${r.status}`);
      ST[lineCode] = {};
    }
  } catch(e) { ST[lineCode] = {}; }
  finally { ST_loading.delete(lineCode); }
}

function getTripStops(tripId) {
  if (!tripId) return null;
  const lineCode = tripId.split('_')[0];
  const key      = tripId.split('_').slice(0,3).join('_');
  const result   = ST[lineCode]?.[key] || null;
  if (ST[lineCode] && !result) {
    const available = Object.keys(ST[lineCode] || {}).slice(0,3);
    console.warn(`[GT] getTripStops miss — looked up "${key}", available sample:`, available);
  }
  return result;
}

async function loadStops() {
  if (STOPS_tried) return;
  STOPS_tried = true;
  try {
    const r = await fetch('/stops.json', { cache: 'force-cache' });
    if (r.ok) {
      STOPS = await r.json();
    } else {
      STOPS = {};
      if (r.status !== 404) console.warn('Stops: HTTP', r.status);
    }
  } catch(e) { STOPS = {}; console.warn('Stops:', e.message); }
}

// shapeChunkCache: lineCode → { shapeId: [[lat,lon],...] }
const shapeChunkCache = {};
const shapeChunkLoading = new Set();

async function fetchShape(shapeId, lineCode) {
  if (!shapeId) return null;
  // lineCode is the first segment of tripId. If missing, fall back to first 4 chars of shapeId
  const lc = lineCode || shapeId.slice(0, 4);
  if (!lc) return null;
  if (!shapeChunkCache[lc] && !shapeChunkLoading.has(lc)) {
    shapeChunkLoading.add(lc);
    try {
      const r = await fetch(`/shapes/${lc}.json`, { cache: 'force-cache' });
      shapeChunkCache[lc] = r.ok ? await r.json() : {};
    } catch(e) {
      shapeChunkCache[lc] = {};
    } finally {
      shapeChunkLoading.delete(lc);
    }
  }
  while (shapeChunkLoading.has(lc)) {
    await new Promise(r => setTimeout(r, 20));
  }
  return shapeChunkCache[lc]?.[shapeId] || null;
}

async function showShape(shapeId, lineCode, fitBounds = false) {
  clearShape();
  const pts = await fetchShape(shapeId, lineCode);
  if (!pts?.length) return;
  // Filter out any points with invalid coords before handing to Leaflet
  const valid = pts.filter(p => p[0] != null && p[1] != null && !isNaN(p[0]) && !isNaN(p[1]));
  if (!valid.length) return;
  shapePolyline = L.polyline(valid, { color: '#00d4ff', weight: 3, opacity: 0.55, interactive: false }).addTo(map);
  shapePolyline.bringToBack();
  if (fitBounds) {
    map.fitBounds(shapePolyline.getBounds(), { padding: [40, 40], maxZoom: 14, animate: true });
  }
}

// lineCode = tripId.split('_')[0]  →  lines[lineCode]
function getLine(tripId) {
  if (!SL || !tripId) return null;
  return SL.lines?.[tripId.split('_')[0]] || null;
}
// 3-part key  →  trips[key]  (headsign, routeId, dir, shapeId)
function getTrip(tripId) {
  if (!SL || !tripId) return null;
  return SL.trips?.[tripId.split('_').slice(0, 3).join('_')] || null;
}
// Exact per-direction route (routeId e.g. "10011")  →  routes[routeId]
function getRoute(routeId) {
  if (!SL || !routeId) return null;
  return SL.routes?.[routeId] || null;
}
// Stop name by stop_id (from stops.json)
function getStop(stopId) {
  if (!STOPS || !stopId) return null;
  const s = STOPS[stopId];
  if (!s) return null;
  return { name: s.n, lat: s.a, lon: s.o };
}
// Stop times for a trip key — defined above near loadStopTimes

// External line number ("1", "302") — never expose internal code
function lineName(tripId)  { return getLine(tripId)?.name || '…'; }
function lineDest(tripId)  { return getTrip(tripId)?.headsign || ''; }
function lineType(tripId)  { return getLine(tripId)?.type || '3'; }
function lineTypeLabel(tripId) { return ROUTE_TYPES[lineType(tripId)] || 'Bus'; }


function lineColor(tripId) {
  const c = getLine(tripId)?.color;
  return c ? '#' + c : null;
}
function lineTextColor(tripId) {
  const c = getLine(tripId)?.textColor;
  return c ? '#' + c : '#ffffff';
}

// Fallback palette used before static loads (keyed on internal code, not shown to user)
const PAL = ["#00d4ff","#ff6b35","#a8ff3e","#ff3b88","#ffcc00","#c77dff","#06ffa5","#ff9f43","#48dbfb","#ff6b6b"];
function palCol(k) {
  let h = 0; for (let i = 0; i < k.length; i++) h = (h * 31 + k.charCodeAt(i)) & 0xffffffff;
  return PAL[Math.abs(h) % PAL.length];
}
function markerCol(tripId) { return lineColor(tripId) || palCol(tripId); }

function fmtD(s) {
  if (s==null||s===0) return {text:'On time',cls:'green'};
  const sg=s>0?'+':'−', a=Math.abs(Math.round(s));
  const text = a<60?`${sg}${a}s`:`${sg}${Math.floor(a/60)}m ${a%60}s`;
  return {text, cls: s>=60?'danger':s<-30?'green':'di'};
}
function fmtB(d) {
  if (d==null) return '–';
  return ["N","NE","E","SE","S","SW","W","NW"][Math.round(d/45)%8]+` ${Math.round(d)}°`;
}

// ── Custom canvas arrow layer ─────────────────────────────────────────────────
// Draws all vehicles on a single <canvas> — zero DOM nodes per vehicle.
// Bearing arrows when bearing is available, circles otherwise.
const ArrowLayer = L.Layer.extend({
  initialize() { this._vehicles = []; },

  onAdd(map) {
    this._map = map;
    this._canvas = L.DomUtil.create('canvas', 'leaflet-layer');
    const pane = map.getPanes().overlayPane;
    pane.appendChild(this._canvas);
    this._ctx = this._canvas.getContext('2d');
    map.on('moveend zoomend resize', this._reset, this);
    this._reset();
  },

  onRemove(map) {
    this._canvas.remove();
    map.off('moveend zoomend resize', this._reset, this);
  },

  setVehicles(vehicles) {
    this._vehicles = vehicles;
    this._draw();
  },

  _reset() {
    const size = this._map.getSize();
    this._canvas.width  = size.x;
    this._canvas.height = size.y;
    // Position canvas over the map pane
    const topLeft = this._map.containerPointToLayerPoint([0,0]);
    L.DomUtil.setPosition(this._canvas, topLeft);
    this._draw();
  },

  _draw() {
    const ctx = this._ctx, m = this._map;
    if (!ctx || !m) return;
    ctx.clearRect(0, 0, this._canvas.width, this._canvas.height);

    for (const v of this._vehicles) {
      const pt = m.latLngToContainerPoint([v.lat, v.lng]);
      const x = pt.x, y = pt.y;
      const color = v.c;
      const isActive  = v.vehicleId === activeId;
      const isDimmed  = activeFilter && !activeFilter.matchIds.has(v.vehicleId);

      ctx.save();
      ctx.translate(x, y);
      ctx.globalAlpha = isDimmed ? 0.15 : 1;

      if (v.bearing != null) {
        ctx.rotate((v.bearing * Math.PI) / 180);
        ctx.beginPath();
        ctx.moveTo(0, -8);
        ctx.lineTo(5, 5);
        ctx.lineTo(0, 2);
        ctx.lineTo(-5, 5);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.strokeStyle = isActive ? '#ffffff' : 'rgba(0,0,0,0.45)';
        ctx.lineWidth = isActive ? 1.5 : 1;
        ctx.fill();
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, isActive ? 7 : 5, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.strokeStyle = isActive ? '#ffffff' : 'rgba(0,0,0,0.45)';
        ctx.lineWidth = isActive ? 1.5 : 1;
        ctx.fill();
        ctx.stroke();
      }

      ctx.restore();
    }
  },

  // Hit test: returns vehicleId of the vehicle clicked, or null
  getVehicleAt(containerPoint) {
    for (const v of this._vehicles) {
      const pt = this._map.latLngToContainerPoint([v.lat, v.lng]);
      const dx = containerPoint.x - pt.x, dy = containerPoint.y - pt.y;
      if (Math.sqrt(dx*dx + dy*dy) < 10) return v.vehicleId;
    }
    return null;
  },
});

const arrowLayer = new ArrowLayer();

// ── Stop marker layer ─────────────────────────────────────────────────────────
// Shows stops along the active route. Status: start|passed|current|upcoming|terminal
// Other stops dimmed when a filter is active.
const StopLayer = L.Layer.extend({
  onAdd(map) { this._map = map; map.on('moveend zoomend', this._draw, this); this._draw(); },
  onRemove(map) { map.off('moveend zoomend', this._draw, this); this._markers?.forEach(m => m.remove()); this._markers = []; },
  _markers: [],
  _routeStops: [],  // [{lat, lon, status}]  status: 'start'|'passed'|'current'|'upcoming'|'terminal'

  setRouteStops(stops) {
    this._routeStops = stops;
    this._draw();
  },

  clearRouteStops() {
    this._routeStops = [];
    this._draw();
  },

  _draw() {
    if (!this._map) return;
    // Remove existing markers
    this._markers.forEach(m => m.remove());
    this._markers = [];
    if (!this._routeStops.length) return;

    const styles = {
      start:    { color: '#a8ff3e', fill: '#a8ff3e', r: 7, weight: 2, opacity: 1 },
      passed:   { color: '#3a5060', fill: '#1e2d3d', r: 4, weight: 1, opacity: 0.5 },
      current:  { color: '#00d4ff', fill: '#00d4ff', r: 9, weight: 3, opacity: 1 },
      upcoming: { color: '#c8dae8', fill: '#141b23', r: 5, weight: 2, opacity: 0.9 },
      terminal: { color: '#ff6b35', fill: '#ff6b35', r: 7, weight: 2, opacity: 1 },
    };

    for (const stop of this._routeStops) {
      const s = styles[stop.status] || styles.upcoming;
      const m = L.circleMarker([stop.lat, stop.lon], {
        radius: s.r, color: s.color, fillColor: s.fill,
        weight: s.weight, opacity: s.opacity, fillOpacity: s.opacity * 0.85,
        className: 'stop-mk',
        interactive: false,
      }).addTo(this._map);
      if (stop.name) m.bindTooltip(stop.name, { permanent: false, direction: 'top', className: 'stop-tip' });
      this._markers.push(m);
    }
  }
});

// ── URL state ─────────────────────────────────────────────────────────────────
// Known param keys — cleared on every push so state is always canonical.
const URL_KEYS = ['line','route','trip','type','vehicle','agency'];

function pushUrlState(params) {
  const url = new URL(location.href);
  URL_KEYS.forEach(k => url.searchParams.delete(k));
  for (const [k, v] of Object.entries(params || {})) {
    if (v != null && v !== '') url.searchParams.set(k, String(v));
  }
  history.replaceState(null, '', url.toString());
}

// Collect the current filter params (without vehicle) for merging when opening a panel.
function filterUrlParams() {

// Called once after first data + static are ready.
async function restoreFromUrl() {
  const sp = new URLSearchParams(location.search);
  const pLine    = sp.get('line');
  const pRoute   = sp.get('route');
  const pTrip    = sp.get('trip');
  const pType    = sp.get('type');
  const pVehicle = sp.get('vehicle');

  if (!pLine && !pRoute && !pTrip && !pType && !pVehicle) return;

  // Wait until static lookup is ready (shapes/stops depend on it)
  await new Promise(resolve => {
    if (SL) return resolve();
    const id = setInterval(() => { if (SL) { clearInterval(id); resolve(); } }, 50);
    setTimeout(() => { clearInterval(id); resolve(); }, 5000); // safety timeout
  });

  // Apply filter first (vehicle select comes after)
  if (pType) {
    const entry = Object.entries(ROUTE_TYPES).find(([code]) => code === pType);
    if (entry) {
      const [code, label] = entry;
      const matchIds = new Set(Object.values(vData)
        .filter(v => (getLine(v.tripId)?.type || '3') === code)
        .map(v => v.vehicleId));
      applyFilter({ matchIds, label, urlKey:'type', urlVal:code }, true);
    }
  } else if (pLine && SL?.lines?.[pLine]) {
    const l = SL.lines[pLine];
    const matchIds = new Set(Object.values(vData)
      .filter(v => v.tripId?.split('_')[0] === pLine).map(v => v.vehicleId));
    const shapeIds = new Set(Object.values(vData)
      .filter(v => v.tripId?.split('_')[0] === pLine)
      .map(v => getTrip(v.tripId)?.shapeId).filter(Boolean));
    const shapeId = shapeIds.size === 1 ? [...shapeIds][0] : null;
    const dirs = [l.dir0, l.dir1].filter(Boolean);
    applyFilter({ matchIds, label: l.name + (dirs.length ? ' · '+dirs.join(' ↔ ') : ''),
                  shapeId, urlKey:'line', urlVal:pLine }, true);
  } else if (pRoute) {
    const matchIds = new Set(); let shapeId=null, lName='', hs='';
    for (const v of Object.values(vData)) {
      const ti = getTrip(v.tripId);
      if (ti?.routeId === pRoute) {
        matchIds.add(v.vehicleId);
        if (!shapeId && ti.shapeId) shapeId = ti.shapeId;
        if (!lName) lName = getLine(v.tripId)?.name || '';
        if (!hs)    hs    = ti.headsign || '';
      }
    }
    if (matchIds.size) applyFilter({ matchIds, label:`${lName} → ${hs}`,
      shapeId, urlKey:'route', urlVal:pRoute }, true);
  } else if (pTrip) {
    const v = Object.values(vData).find(v =>
      v.tripId?.split('_').slice(0,3).join('_') === pTrip || v.tripId === pTrip);
    if (v) {
      const matchIds = new Set([v.vehicleId]);
      const tripShapeId = getTrip(v.tripId)?.shapeId || null;
      applyFilter({ matchIds, label:`Trip ${pTrip}`,
        shapeId:tripShapeId, urlKey:'trip', urlVal:pTrip }, true);
    }
  }

  // Open vehicle panel directly (URL paste / sidebar click behaviour)
  if (pVehicle) {
    const v = Object.values(vData).find(v => v.vehicleId === pVehicle);
    if (v) { select(v.vehicleId); openPanel(v.vehicleId); }
  }
}

// ── Search ────────────────────────────────────────────────────────────────────
const sinput = G("search-input");
const sdrop  = G("search-drop");
const sclear = G("search-clear");
let dropItems = [], dropHi = -1;

sinput.addEventListener("input",  () => { buildDrop(); });
sinput.addEventListener("keydown", e => {
  if (!sdrop.classList.contains("on")) return;
  if (e.key === "ArrowDown") { e.preventDefault(); moveDrop(1); }
  else if (e.key === "ArrowUp") { e.preventDefault(); moveDrop(-1); }
  else if (e.key === "Enter")  { e.preventDefault(); if (dropHi >= 0) dropItems[dropHi]?.apply(); }
  else if (e.key === "Escape") { closeDrop(); sinput.blur(); }
});
sinput.addEventListener("focus", () => { if (sinput.value) buildDrop(); });
document.addEventListener("click", e => {
  if (!G("search-wrap").contains(e.target)) closeDrop();
});

function closeDrop() { sdrop.classList.remove("on"); dropHi = -1; }

function moveDrop(dir) {
  const els = sdrop.querySelectorAll(".sd-item");
  if (!els.length) return;
  els[dropHi]?.classList.remove("hi");
  dropHi = Math.max(0, Math.min(els.length - 1, dropHi + dir));
  els[dropHi]?.classList.add("hi");
  els[dropHi]?.scrollIntoView({ block: "nearest" });
}

function buildDrop() {
  const q = sinput.value.trim().toLowerCase();
  sclear.style.display = q ? "block" : "none";
  if (!q) { closeDrop(); return; }

  const groups = [];   // [{label, items:[{badge,color,textColor,main,sub,delay,apply}]}]
  const agencyName = SL?.agency?.['delijn']?.name || 'De Lijn';

  // ── Agency match ───────────────────────────────────────────────────────────
  if (agencyName.toLowerCase().includes(q)) {
    groups.push({ label: 'Agency', items: [{
      badge: 'ALL', color: '#1e2d3d', textColor: '#c8dae8',
      main: agencyName, sub: `${Object.keys(vData).length} vehicles`,
      delay: null,
      apply() { applyFilter(null); }    // agency = show all
    }]});
  }

  // ── Vehicle type match ─────────────────────────────────────────────────────
  const typeMatches = [];
  for (const [code, label] of Object.entries(ROUTE_TYPES)) {
    if (label.toLowerCase().includes(q)) {
      const matchIds = new Set(Object.values(vData)
        .filter(v => (getLine(v.tripId)?.type || '3') === code)
        .map(v => v.vehicleId));
      if (matchIds.size > 0) {
        typeMatches.push({
          badge: label[0], color: '#1e2d3d', textColor: '#c8dae8',
          main: label, sub: `${matchIds.size} vehicles`,
          delay: null,
          apply() { applyFilter({ matchIds, label, urlKey:'type', urlVal:code }); }
        });
      }
    }
  }
  if (typeMatches.length) groups.push({ label: 'Type', items: typeMatches });

  // ── Line name match (external: "1", "X19", "302") ─────────────────────────
  // One entry per internal line code — so "X19 Neerpelt-Hasselt" and
  // "X19 Antwerpen-Rumst" show as separate entries even though both are "X19".
  if (SL?.lines) {
    const lineItems = [];
    for (const [code, l] of Object.entries(SL.lines)) {
      if (!l.name.toLowerCase().includes(q)) continue;
      const matchIds = new Set();
      const shapeIds = new Set();
      for (const v of Object.values(vData)) {
        if (v.tripId?.split('_')[0] === code) {
          matchIds.add(v.vehicleId);
          const sid = getTrip(v.tripId)?.shapeId;
          if (sid) shapeIds.add(sid);
        }
      }
      if (!matchIds.size) continue;
      const color  = l.color ? '#'+l.color : '#444';
      const textC  = l.textColor ? '#'+l.textColor : '#fff';
      const snap   = new Set(matchIds);
      const shapeId = shapeIds.size === 1 ? [...shapeIds][0] : null;
      // Build route description from dir0/dir1
      const dirs = [l.dir0, l.dir1].filter(Boolean);
      const routeDesc = dirs.length ? dirs.join(' ↔ ') : '';
      const label = `${l.name}${routeDesc ? ' · ' + routeDesc : ''}`;
      lineItems.push({
        badge: l.name, color, textC,
        main: label, sub: `${snap.size} vehicle${snap.size!==1?'s':''}`,
        delay: null,
        apply() { applyFilter({ matchIds: snap, label, shapeId, urlKey:'line', urlVal:code }); }
      });
    }
    if (lineItems.length) groups.push({ label: 'Line', items: lineItems.slice(0,8) });
  }

  // ── Route ID match (per-direction: "X19 → Neerpelt") ──────────────────────
  if (SL?.trips) {
    const routeHits = new Map(); // routeId → {lineName, headsign, matchIds}
    for (const v of Object.values(vData)) {
      const tripInfo = getTrip(v.tripId);
      const lineInfo = getLine(v.tripId) || {};
      if (!tripInfo) continue;
      const rid = tripInfo.routeId;
      const name = lineInfo.name || '';
      const hs   = tripInfo.headsign || '';
      const label = `${name} → ${hs}`;
      if (!label.toLowerCase().includes(q) && !rid?.toLowerCase().includes(q)) continue;
      if (!routeHits.has(rid)) routeHits.set(rid, { lineName: name, headsign: hs, color: lineInfo.color, textColor: lineInfo.textColor, matchIds: new Set(), shapeId: tripInfo.shapeId || null });
      routeHits.get(rid).matchIds.add(v.vehicleId);
    }
    const routeItems = [];
    for (const [rid, entry] of routeHits) {
      const color = entry.color ? '#'+entry.color : '#444';
      const textC = entry.textColor ? '#'+entry.textColor : '#fff';
      const snap = new Set(entry.matchIds);
      routeItems.push({
        badge: entry.lineName, color, textC,
        main: `${entry.lineName} → ${entry.headsign}`,
        sub: `${snap.size} vehicles`,
        delay: null,
        apply() { applyFilter({ matchIds: snap, label: `${entry.lineName} → ${entry.headsign}`, shapeId: entry.shapeId, urlKey:'route', urlVal:rid }); }
      });
    }
    if (routeItems.length) groups.push({ label: 'Route', items: routeItems.slice(0,6) });
  }

  // ── Trip ID match ──────────────────────────────────────────────────────────
  const tripItems = [];
  for (const v of Object.values(vData)) {
    if (!v.tripId?.toLowerCase().includes(q)) continue;
    const name = lineName(v.tripId), dest = lineDest(v.tripId);
    const c = markerCol(v.tripId), tc = lineTextColor(v.tripId);
    const d = fmtD(v.delay);
    const snap = new Set([v.vehicleId]);
    const tripShapeId = getTrip(v.tripId)?.shapeId || null;
    tripItems.push({
      badge: name, color: c, textC: tc,
      main: dest ? `${name} → ${dest}` : v.tripId.slice(0,30),
      sub: v.vehicleId, delayText: d.text, delayCls: d.cls,
      apply() { const tripKey=v.tripId.split('_').slice(0,3).join('_'); applyFilter({ matchIds: snap, label: `Trip ${tripKey}`, shapeId: tripShapeId, urlKey:'trip', urlVal:tripKey }); select(v.vehicleId); openPanel(v.vehicleId); }
    });
  }
  if (tripItems.length) groups.push({ label: 'Trip', items: tripItems.slice(0,4) });

  // ── Vehicle ID match ───────────────────────────────────────────────────────
  const vehItems = [];
  for (const v of Object.values(vData)) {
    if (!v.vehicleId?.toLowerCase().includes(q)) continue;
    const name = lineName(v.tripId), dest = lineDest(v.tripId);
    const c = markerCol(v.tripId), tc = lineTextColor(v.tripId);
    const d = fmtD(v.delay);
    const snap = new Set([v.vehicleId]);
    vehItems.push({
      badge: name, color: c, textC: tc,
      main: dest ? `${name} → ${dest}` : name,
      sub: v.vehicleId, delayText: d.text, delayCls: d.cls,
      apply() { applyFilter({ matchIds: snap, label: `Vehicle ${v.vehicleId}` }); select(v.vehicleId); openPanel(v.vehicleId); }
    });
  }
  if (vehItems.length) groups.push({ label: 'Vehicle', items: vehItems.slice(0,4) });

  // ── Render dropdown ────────────────────────────────────────────────────────
  dropItems = [];
  if (!groups.length) {
    sdrop.innerHTML = `<div style="padding:12px 14px;font-size:11px;color:var(--text-dim);font-family:var(--font-mono)">No results</div>`;
    sdrop.classList.add("on");
    return;
  }

  let html = '';
  for (const g of groups) {
    html += `<div class="sd-group">${g.label}</div>`;
    for (const it of g.items) {
      const idx = dropItems.length;
      dropItems.push(it);
      const delaySpan = it.delayText
        ? `<span class="sd-delay" style="color:var(--${it.delayCls})">${it.delayText}</span>`
        : (it.sub ? `<span class="sd-sub">${it.sub}</span>` : '');
      html += `<div class="sd-item" data-i="${idx}">
        <span class="sd-badge" style="background:${it.color}22;color:${it.color};border:1px solid ${it.color}44">${it.badge}</span>
        <span class="sd-main">${it.main}</span>
        ${delaySpan}
      </div>`;
    }
  }
  sdrop.innerHTML = html;
  sdrop.querySelectorAll(".sd-item").forEach(el => {
    el.addEventListener("mousedown", e => {
      e.preventDefault(); // prevent blur
      dropItems[+el.dataset.i]?.apply();
      closeDrop();
    });
  });
  sdrop.classList.add("on");
  dropHi = -1;
}

function applyFilter(filter, skipPush=false) {
  activeFilter = filter;
  if (!skipPush) pushUrlState(filter ? { [filter.urlKey]: filter.urlVal } : {});
  const all = Object.values(vData).sort((a,b) => (b.delay||0)-(a.delay||0));
  sortedV = filter ? all.filter(v => filter.matchIds.has(v.vehicleId)) : all;
  G("bv").textContent = sortedV.length;

  // Draw route shape + fit map when filter resolves to a single unique shape
  if (filter?.shapeId) {
    // fetchShape will derive lineCode from first 4 chars of shapeId if needed
    const anyV = filter.matchIds.size ? Object.values(vData).find(v => filter.matchIds.has(v.vehicleId)) : null;
    const lc = anyV?.tripId?.split('_')[0] || null;
    showShape(filter.shapeId, lc, true /* fitBounds */);
  } else if (!filter || filter.matchIds.size > 1) {
    clearShape();
    stopLayer.clearRouteStops();
  }

  // Flush virtual scroll so stale rows don't linger
  const win = G("wv");
  [...win.children].forEach(ch => { win.removeChild(ch); freeRow(ch); });
  G("pv").scrollTop = 0;
  arrowLayer._draw();
  redraw();
  if (filter) {
    sinput.value = filter.label;
    sclear.style.display = "block";
  }
}

function clearSearch() {
  sinput.value = "";
  sclear.style.display = "none";
  closeDrop();
  clearShape();
  stopLayer.clearRouteStops();
  applyFilter(null);  // applyFilter(null) pushes empty URL
}

// ── Virtual scroll ────────────────────────────────────────────────────────────
const pool=[];
function getRow(){return pool.pop()||document.createElement("div")}
function freeRow(el){pool.push(el)}

function drawList(paneId,spacerId,winId,items,rowH,renderFn){
  const pane=G(paneId),spacer=G(spacerId),win=G(winId);
  spacer.style.height=(items.length*rowH)+"px";
  const scrollTop=pane.scrollTop,viewH=pane.clientHeight;
  const b0=Math.max(0,Math.floor(scrollTop/rowH)-4);
  const b1=Math.min(items.length-1,Math.ceil((scrollTop+viewH)/rowH)+4);
  const keep=new Set();for(let i=b0;i<=b1;i++)keep.add(i);
  for(const ch of[...win.children]){const idx=+ch.dataset.i;if(!keep.has(idx)){win.removeChild(ch);freeRow(ch)}}
  const existing=new Set([...win.children].map(c=>+c.dataset.i));
  for(let i=b0;i<=b1;i++){
    if(existing.has(i))continue;
    const item=items[i];if(!item)continue;
    const row=getRow();renderFn(row,item);row.dataset.i=i;
    row.style.cssText=`position:absolute;top:${i*rowH}px;left:0;right:0;height:${rowH}px;`;
    win.appendChild(row);
  }
}

function renderV(row,v){

function shareVehicleUrl() {

// Render the stop sequence for the selected vehicle
async function renderStopsForVehicle(v) {
  const el = G("stops-list");
  if (!el) return;
  try {
    await Promise.all([loadStops(), loadStopTimes(v.tripId)]);
    if (activeId !== v.vehicleId) return;  // vehicle was deselected while loading

    const stops = getTripStops(v.tripId);
    if (!stops?.length) { el.textContent = 'No stop data available'; return; }

  // Determine current "position" by finding the first stop whose scheduled
  // time + delay is in the future (or the first stop if all are past)
  const nowMins = new Date().getHours() * 60 + new Date().getMinutes();
  const delayMins = Math.round((v.delay || 0) / 60);
  let nextIdx = stops.findIndex(s => s.a != null && (s.a + delayMins) >= nowMins);
  if (nextIdx < 0) nextIdx = stops.length; // all passed

  function fmtMins(m) {
    if (m == null) return '';
    const h = Math.floor(m / 60) % 24, mn = m % 60;
    return `${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;
  }

  const rows = stops.map((st, i) => {
    const stop    = getStop(st.s);
    const name    = stop?.name || st.s;
    const isPast  = i < nextIdx;
    const isNext  = i === nextIdx;
    const isTerm  = i === stops.length - 1;
    const dotCls  = isTerm ? 'term' : isNext ? 'next' : isPast ? 'passed' : '';
    const nameCls = isPast ? 'passed' : '';

    let timesHtml = '';
    if (st.a != null) {
      const sched = fmtMins(st.a);
      const adj   = fmtMins(st.a + delayMins);
      const late  = delayMins >= 2 ? (delayMins >= 5 ? 'vlate' : 'late') : 'adj';
      timesHtml = `<span style="color:var(--text-dim)">${sched}</span>`
        + (delayMins !== 0 ? ` <span class="${isPast ? '' : late}">${adj}</span>` : '');
    }

    return `<div class="stop-row">
      <div class="stop-dot ${dotCls}"></div>
      <div class="stop-info">
        <div class="stop-name ${nameCls}">${name}</div>
        ${timesHtml ? `<div class="stop-times">${timesHtml}</div>` : ''}
      </div>
    </div>`;
  });

  el.innerHTML = `<div class="stop-list">${rows.join('')}</div>`;

  // Scroll so the next stop is visible
  if (nextIdx > 2) {
    const rowEls = el.querySelectorAll('.stop-row');
    rowEls[Math.max(0, nextIdx - 1)]?.scrollIntoView({ block: 'start', behavior: 'smooth' });
  }
  } catch(e) {
    console.warn('renderStopsForVehicle:', e);
    const el2 = G("stops-list");
    if (el2 && activeId === v.vehicleId) el2.textContent = 'Error loading stops';
  }
}

// Build stop marker array for a vehicle's route and hand to stopLayer
async function renderStopMarkers(v) {
  if (!v?.tripId) return;
  const seq = getTripStops(v.tripId);
  if (!seq?.length) return;
  if (activeId !== v.vehicleId) return;

  const nowMins  = new Date().getHours() * 60 + new Date().getMinutes();
  const delayMins = Math.round((v.delay || 0) / 60);
  let nextIdx = seq.findIndex(s => s.a != null && (s.a + delayMins) >= nowMins);
  if (nextIdx < 0) nextIdx = seq.length;

  const markers = seq.map((st, i) => {
    const stop = getStop(st.s);
    // Guard against missing or NaN coordinates
    if (!stop || !isFinite(stop.lat) || !isFinite(stop.lon)) return null;
    let status;
    if (i === 0)                  status = 'start';
    else if (i === seq.length-1)  status = 'terminal';
    else if (i < nextIdx)         status = 'passed';
    else if (i === nextIdx)       status = 'current';
    else                          status = 'upcoming';
    return { lat: stop.lat, lon: stop.lon, name: stop.name, status };
  }).filter(Boolean);

  stopLayer.setRouteStops(markers);
}

function closePanel(){

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function refresh(){
  const pd=G("pd"),lt=G("lt");
  pd.className="pulse spin";lt.textContent="Fetching…";
  let data;
  try{
    const r=await fetch("/api/gtfs",{cache:"no-store"});
    if(!r.ok){const e=await r.json().catch(()=>({error:`HTTP ${r.status}`}));throw new Error(e.error)}
    data=await r.json();
  }catch(err){pd.className="pulse err";lt.textContent="Error";toast("⚠ "+err.message,true);return}
  pd.className="pulse";lt.textContent="Live";
  G("ts").textContent=new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  process(data);startBar();
}

function process(data){
  const vehicles=data.vehicles||[], canceled=data.canceled||[];
  const seen=new Set();
  let onTime=0,delayed=0,early=0;

  for(const v of vehicles){
    const id=v.vehicleId||v.tripId;
    const c=markerCol(v.tripId);
    const delay=v.delay;
    seen.add(id);
    if(delay!=null&&Math.abs(delay)<60)onTime++;
    else if(delay!=null&&delay>=60)delayed++;
    if(delay!=null&&delay<-30)early++;

    vData[id]={vehicleId:id,tripId:v.tripId,routeId:v.routeId,lat:v.lat,lng:v.lng,bearing:v.bearing,delay,c};
  }

  // Remove stale vehicles
  for (const id of Object.keys(vData)) {
    if (!seen.has(id)) {
      if (id === activeId) closePanel(); // vehicle disappeared
      delete vData[id];
    }
  }

  // Single canvas redraw — all vehicles in one pass
  arrowLayer.setVehicles(Object.values(vData));

  // Keep selected vehicle centred as it moves
  if (activeId && vData[activeId]) {
    panToVehicle(vData[activeId]);
    if (activePopup) activePopup.setLatLng([vData[activeId].lat, vData[activeId].lng]);
  }

  G("sv").textContent=vehicles.length;
  G("so").textContent=onTime;
  G("sd").textContent=delayed;
  G("sc2").textContent=canceled.length;
  G("se2").textContent=early;
  G("se").textContent=data.counts?.entities||vehicles.length+canceled.length;

  const all = Object.values(vData).sort((a,b)=>(b.delay||0)-(a.delay||0));
  sortedV = activeFilter ? all.filter(v => activeFilter.matchIds.has(v.vehicleId)) : all;
  // Canceled: also filter by active filter when set
  const allC = [...canceled].sort((a,b)=>a.tripId.localeCompare(b.tripId));
  sortedC = activeFilter ? allC.filter(c => activeFilter.matchIds.has(c.vehicleId||c.tripId)) : allC;
  G("bv").textContent = sortedV.length;
  G("bc").textContent = sortedC.length;
  G("bc").style.background = sortedC.length > 0 ? "rgba(255,59,92,.2)" : "";
  G("bc").style.color = sortedC.length > 0 ? "var(--danger)" : "";
  redraw();
}

// Pan/zoom so the vehicle appears centred in the visible area,
// accounting for the 290px left sidebar and 320px right panel (when open).
function panToVehicle(v, zoom) {
  const mobile     = window.innerWidth <= 768;
  const panelOpen  = !mobile && G("info-panel").classList.contains("open");
  const leftPad    = mobile ? 0 : 290;
  const rightPad   = panelOpen ? 320 : 0;
  const W          = window.innerWidth;
  const H          = window.innerHeight;
  const z          = zoom ?? map.getZoom();

  // Step 1: put vehicle exactly at map centre (no animation)
  map.setView([v.lat, v.lng], z, { animate: false });

  // Step 2: pan so vehicle lands at the visual centre of the unobstructed area.
  const visCX   = leftPad + (W - leftPad - rightPad) / 2;
  const offsetX = -(visCX - W / 2);
  map.panBy([offsetX, 0], { animate: true });
}

function select(id){
  activeId = id;
  const v = vData[id]; if (!v) return;
  arrowLayer._draw();
  showPopup(id);
  closeSidebarMobile();
  redraw();
}

function schedNext(){clearTimeout(rtimer);rtimer=setTimeout(async()=>{await refresh();schedNext()},REFRESH)}

let _firstLoad = true;
async function _init() {
  loadStatic();
  await refresh();
  // After first data + static lookup are in, restore any URL state
  // Give static a moment to finish if it arrived slightly after refresh
  if (_firstLoad) {
    _firstLoad = false;
    // Static may still be in-flight; wait a tick then restore
    await new Promise(r => setTimeout(r, 200));
    await restoreFromUrl();
  }
  schedNext();
}
_init();
</script>
