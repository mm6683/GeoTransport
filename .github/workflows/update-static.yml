name: Update GTFS Static Lookup

on:
  schedule:
    - cron: '0 4 * * *'    # Every day at 04:00 UTC
  workflow_dispatch:         # Manual trigger from GitHub UI
  push:
    branches:
      - main                 # Run on every push to main (ensures static files are always deployed)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install jszip
        run: npm install jszip

      - name: Run build script
        env:
          DL_GTFS: ${{ secrets.DL_GTFS }}
        run: node scripts/build-static-lookup.js

      - name: Check if static files changed
        id: diff
        run: |
          git diff --quiet public/static-lookup.json public/stops.json \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit static files (small enough for git)
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/static-lookup.json public/stops.json
          git commit -m "chore: update GTFS static files [skip ci]"
          git push

      - name: Deploy to Cloudflare Workers (includes all large files)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
