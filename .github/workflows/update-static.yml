name: Update GTFS Static Lookup

on:
  schedule:
    - cron: '0 4 * * *'    # Every day at 04:00 UTC
  workflow_dispatch:         # Manual trigger from GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install jszip (build script dependency)
        run: npm install jszip

      - name: Run build script
        env:
          DL_GTFS: ${{ secrets.DL_GTFS }}
        run: node scripts/build-static-lookup.js

      - name: Check if static files changed
        id: diff
        run: |
          git diff --quiet public/static-lookup.json public/stop-times.json \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated files
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/static-lookup.json public/stop-times.json
          git commit -m "chore: update GTFS static lookup [skip ci]"
          git push

      - name: Deploy to Cloudflare Workers
        if: steps.diff.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
