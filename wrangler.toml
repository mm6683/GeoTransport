name = "geotransport"
main = "src/worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

assets = { directory = "./public", binding = "ASSETS" }

# Custom domain — requires geotransport.be to be on Cloudflare (orange-cloud proxied)
[[routes]]
pattern = "geotransport.be/*"
zone_name = "geotransport.be"

# ── Secrets (set via CLI, never commit these) ──────────────────────────────────
#
# GTFS Realtime key (used by the Worker on every request):
#   wrangler secret put DL_GTFSRT
#
# GTFS Static key (used LOCALLY by the build script — NOT needed in the Worker):
#   set DL_GTFS=your_key   (Windows)
#   export DL_GTFS=your_key (Unix/Mac)
#   node scripts/build-static-lookup.js
#
# After running the build script, deploy to update static-lookup.json:
#   wrangler deploy
